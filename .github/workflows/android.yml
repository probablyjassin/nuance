name: Android CI/CD

on:
  workflow_dispatch:
  push:
    tags:
      - 'v[0-9]*' 
      # git tag v1.0.0
      # git push origin v1.0.0

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: gradle

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    # 1. Decode the keystore file to the root workspace directory
    - name: Decode Keystore
      env:
        ENCODED_STRING: ${{ secrets.SIGNING_KEY_BASE64 }}
      run: |
        echo "$ENCODED_STRING" | tr -d '[:space:]' | base64 --decode > github-keystore.jks

    # 2. Pass the secrets directly to Gradle using -P parameters
    - name: Build Release with Gradle
      run: |
        ./gradlew assembleRelease \
          -Pandroid.injected.signing.store.file=$GITHUB_WORKSPACE/github-keystore.jks \
          -Pandroid.injected.signing.store.password="${{ secrets.KEY_STORE_PASSWORD }}" \
          -Pandroid.injected.signing.key.alias="${{ secrets.KEY_ALIAS }}" \
          -Pandroid.injected.signing.key.password="${{ secrets.KEY_PASSWORD }}"

    # 3. Upload artifact (Note: path updated to grab the signed 'app-release.apk')
    - name: Upload Release Artifact
      uses: actions/upload-artifact@v4
      with:
        name: signed-app-release
        path: app/release/app-release.apk
